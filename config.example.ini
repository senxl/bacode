; ============================================================================
;  网格交易机器人 —— 配置文件（示例）
;  复制此文件为 config.ini 并填入你的真实 API 密钥
; ============================================================================

; ---------- 通用设置 ----------
[general]
; API 密钥（必填）
api_key = 在此填入你的 API Key
api_secret = 在此填入你的 API Secret
; 测试网开关（true / false）
testnet = true

; 当前激活的交易对，必须匹配下方某个 [区块名]
active_symbol = ETHUSDT

; 主循环轮询间隔（秒）
poll_interval = 0.3
; 价格超出区间后的休眠时间（秒）
price_oor_sleep = 5.0
; API 错误后的休眠时间（秒）
error_sleep = 1.0
; 配置热重载检测间隔（秒），0 = 每次循环都检查
reload_check_interval = 3.0

; ---------- 交易对：ETHUSDT ----------
[ETHUSDT]
trade_type = LONG
leverage = 100
trade_quantity = 0.3
savepos_multiplier = 5
grid_size = 1
grid_size_over = 1.5
price_upper_limit = 4000.0
price_lower_limit = 1000.0

; ---------- ATR 动态步长（可选） ----------
; grid_mode = atr              ; fixed（默认）= 固定步长，atr = 根据 ATR 动态调整
; atr_period = 14              ; ATR 计算周期（默认 14）
; atr_multiplier = 0.5         ; 步长 = ATR × 此倍数（默认 0.5）
; atr_update_interval = 86400  ; ATR 刷新间隔，秒（默认 86400，即 1 天）
; atr_change_threshold = 0.1   ; ATR 变化超过此比例才更新步长（默认 10%）
; atr_kline_interval = 4h      ; ATR 用的 K 线周期（默认 4h，独立于 GUI 的 kline_interval）
; atr_immediate_rebuild = true ; ATR 更新步长后是否立即重建网格（默认 true）

; ---------- 交易对：BTCUSDT（示例） ----------
;[BTCUSDT]
;trade_type = LONG
;leverage = 5
;trade_quantity = 0.001
;savepos_multiplier = 3
;grid_size = 500.0
;grid_size_over = 1.5
;price_upper_limit = 120000.0
;price_lower_limit = 60000.0

; ---------- GUI 面板 ----------
[gui]
enabled = true
refresh_ms = 500
kline_interval = 1h
kline_limit = 50
