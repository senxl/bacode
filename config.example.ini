; ============================================================================
;  网格交易机器人 —— 配置文件（示例）
;  复制此文件为 config.ini 并填入你的真实 API 密钥
; ============================================================================

; ---------- 通用设置 ----------
[general]
; API 密钥（必填）
api_key = 在此填入你的 API Key
api_secret = 在此填入你的 API Secret
; 测试网开关（true / false）
testnet = true

; 当前激活的交易对，必须匹配下方某个 [区块名]
active_symbol = ETHUSDT

; 主循环轮询间隔（秒）
poll_interval = 0.3
; 价格超出区间后的休眠时间（秒）
price_oor_sleep = 5.0
; API 错误后的休眠时间（秒）
error_sleep = 1.0
; 配置热重载检测间隔（秒），0 = 每次循环都检查
reload_check_interval = 3.0

; ---------- 交易对：ETHUSDT ----------
[ETHUSDT]
trade_type = LONG
leverage = 100
trade_quantity = 0.3
savepos_multiplier = 5
grid_size = 1
grid_size_over = 1.5
price_upper_limit = 4000.0
price_lower_limit = 1000.0

; ---------- 交易对：BTCUSDT（示例） ----------
;[BTCUSDT]
;trade_type = LONG
;leverage = 5
;trade_quantity = 0.001
;savepos_multiplier = 3
;grid_size = 500.0
;grid_size_over = 1.5
;price_upper_limit = 120000.0
;price_lower_limit = 60000.0

; ---------- GUI 面板 ----------
[gui]
enabled = true
refresh_ms = 500
kline_interval = 1h
kline_limit = 50
